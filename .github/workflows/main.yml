name: Update and Deploy Exam Calendar

on:
  schedule:
    - cron: '0 0 * * *' # รันทุกวันเวลา 07:00 น. (เวลาไทย)
  workflow_dispatch: # ยอมให้กดรันเองได้จากหน้า GitHub
  push:
    branches: ["main"]
    paths:
      - "students.txt" # รันใหม่ถ้ามีการเพิ่มรหัสนิสิต

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper for all students
        env:
          STUDENT_ID: ${{ secrets.STUDENT_ID }} # ยอมให้รันเฉพาะกิจผ่าน Secret ได้ด้วย
        run: python main.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4